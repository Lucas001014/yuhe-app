name: EAS Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # 允许创建 Release 和上传文件

jobs:
  build-and-release:
    name: Build APK & Create Release
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./client
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build APK with EAS
        id: build
        working-directory: ./client
        run: |
          echo "Building Android APK..."
          
          # 启动构建并等待完成
          eas build --platform android --profile preview --non-interactive --wait
          
          # 获取最新构建信息
          echo "Getting build info..."
          BUILD_INFO=$(eas build:list --platform android --limit 1 --json)
          echo "Build info: $BUILD_INFO"
          
          # 提取构建 ID 和下载 URL
          BUILD_ID=$(echo "$BUILD_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if d else '')")
          BUILD_URL=$(echo "$BUILD_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0].get('artifacts', {}).get('buildUrl', '') if d else '')")
          
          echo "Build ID: $BUILD_ID"
          echo "Build URL: $BUILD_URL"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          
          # 下载 APK - 直接使用 curl 从 buildUrl 下载
          echo "Downloading APK from build URL..."
          if [ -n "$BUILD_URL" ]; then
            curl -L -o yuhe.apk "$BUILD_URL"
          else
            echo "No build URL, trying eas build:download..."
            eas build:download "$BUILD_ID" --output yuhe.apk
          fi
          
          # 验证 APK 文件
          echo "Verifying APK..."
          ls -la yuhe.apk
          APK_SIZE=$(stat -c%s yuhe.apk 2>/dev/null || echo "0")
          echo "APK size: $APK_SIZE bytes ($(($APK_SIZE / 1024 / 1024)) MB)"
          
          if [ "$APK_SIZE" -lt 10000000 ]; then
            echo "错误: APK 文件太小，下载可能失败"
            exit 1
          fi
          
          # 获取版本信息
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' app.config.ts | head -1 || echo "1.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"
          pwd

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.build.outputs.version }}-${{ github.run_number }}
          name: 遇合 v${{ steps.build.outputs.version }}
          body: |
            ## 遇合 App v${{ steps.build.outputs.version }}
            
            ### 下载方式
            - **Android**: 下载下方的 `yuhe.apk` 文件直接安装
            - **iOS**: 即将上架 App Store
            
            ### 更新内容
            - 修复已知问题
            - 优化用户体验
            
            ---
            
            **安装说明**：Android 用户下载 APK 后，可能需要在设置中允许"安装未知来源应用"。
          files: client/yuhe.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
