name: EAS Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build APK & Create Release
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./client
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build APK with EAS
        id: build
        working-directory: ./client
        run: |
          echo "Building Android APK..."
          export EAS_BUILD_NO_EXPO_GO_WARNING=true
          
          # 启动构建并等待完成（使用 preview profile）
          eas build --platform android --profile preview --non-interactive --wait
          
          # 获取最新构建的ID和下载URL
          BUILD_INFO=$(eas build:list --platform android --limit 1 --json)
          BUILD_ID=$(echo "$BUILD_INFO" | python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0]['id'] if data else '')")
          BUILD_URL=$(echo "$BUILD_INFO" | python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0].get('artifacts', {}).get('buildUrl', '') if data else '')")
          
          echo "Build ID: $BUILD_ID"
          echo "Build URL: $BUILD_URL"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          
          # 下载APK (使用 curl 从构建URL下载)
          echo "Downloading APK..."
          if [ -n "$BUILD_URL" ]; then
            curl -L -o yuhe.apk "$BUILD_URL"
          else
            # 备用方案：使用 eas build:download
            eas build:download "$BUILD_ID" --output yuhe.apk || curl -L -o yuhe.apk "https://expo.dev/accounts/wangfuqian/projects/yuhe/builds/$BUILD_ID"
          fi
          
          # 获取版本信息
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' app.config.ts | head -1 || echo "1.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"
          
          # 显示APK信息
          ls -lh yuhe.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.build.outputs.version }}-${{ github.run_number }}
          name: 遇合 v${{ steps.build.outputs.version }}
          body: |
            ## 遇合 App v${{ steps.build.outputs.version }}
            
            ### 下载方式
            - **Android**: 下载下方的 `yuhe.apk` 文件直接安装
            - **iOS**: 即将上架 App Store
            
            ### 更新内容
            - 修复已知问题
            - 优化用户体验
            
            ---
            
            **安装说明**：Android 用户下载 APK 后，可能需要在设置中允许"安装未知来源应用"。
          files: |
            client/yuhe.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
