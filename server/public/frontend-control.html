<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端控制面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title .icon {
            font-size: 24px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.online {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }
        
        .status-dot.offline {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .status-text {
            font-size: 16px;
            font-weight: 600;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #94a3b8;
        }
        
        .info-value {
            font-weight: 600;
            color: #e2e8f0;
        }
        
        .button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .button-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .button-danger {
            background: linear-gradient(135deg, #f43f5e 0%, #ec4899 100%);
            color: white;
        }
        
        .button-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 63, 94, 0.4);
        }
        
        .button-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        
        .button-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }
        
        .button-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }
        
        .button-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
        }
        
        .log-container {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #1e293b;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-time {
            color: #64748b;
        }
        
        .log-level-info {
            color: #3b82f6;
        }
        
        .log-level-error {
            color: #ef4444;
        }
        
        .log-level-warn {
            color: #f59e0b;
        }
        
        .log-message {
            color: #e2e8f0;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .stat-item {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #94a3b8;
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        
        .badge-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .command-input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .command-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .command-output {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #e2e8f0;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .environment-vars {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .env-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #0f172a;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .env-key {
            font-weight: 600;
            color: #667eea;
            font-family: 'Courier New', monospace;
        }
        
        .env-value {
            color: #10b981;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 前端控制面板</h1>
            <p>实时监控和控制 Expo 前端应用</p>
        </div>
        
        <div class="grid">
            <!-- 服务状态 -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">📡</span>
                    服务状态
                </div>
                
                <div class="status">
                    <div class="status-dot" id="status-dot"></div>
                    <span class="status-text" id="status-text">检查中...</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label">端口</span>
                    <span class="info-value">5000</span>
                </div>
                <div class="info-item">
                    <span class="info-label">访问地址</span>
                    <span class="info-value">localhost:5000</span>
                </div>
                <div class="info-item">
                    <span class="info-label">启动时间</span>
                    <span class="info-value" id="uptime">-</span>
                </div>
                
                <button class="button button-success" onclick="checkStatus()">
                    🔄 刷新状态
                </button>
            </div>
            
            <!-- 快速操作 -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">⚡</span>
                    快速操作
                </div>
                
                <div class="quick-actions">
                    <button class="button button-primary" onclick="reloadApp()">
                        🔄 重载应用
                    </button>
                    <button class="button button-warning" onclick="clearCache()">
                        🗑️ 清理缓存
                    </button>
                    <button class="button button-success" onclick="openDevTools()">
                        🔧 开发者工具
                    </button>
                    <button class="button button-danger" onclick="hardRefresh()">
                        🔄 硬刷新
                    </button>
                </div>
            </div>
            
            <!-- 统计信息 -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">📊</span>
                    统计信息
                </div>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="page-views">-</div>
                        <div class="stat-label">页面访问</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="api-calls">-</div>
                        <div class="stat-label">API 调用</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="errors">-</div>
                        <div class="stat-label">错误数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="memory">-</div>
                        <div class="stat-label">内存使用</div>
                    </div>
                </div>
            </div>
            
            <!-- 环境变量 -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">🔑</span>
                    环境变量
                </div>
                
                <div class="environment-vars" id="env-vars">
                    <!-- 动态加载 -->
                </div>
            </div>
        </div>
        
        <!-- 命令执行 -->
        <div class="card" style="margin-bottom: 20px;">
            <div class="card-title">
                <span class="icon">💻</span>
                命令执行
            </div>
            
            <input type="text" class="command-input" 
                   placeholder="输入命令（如：console.log('test')）" 
                   id="command-input"
                   onkeypress="if(event.key === 'Enter') executeCommand()">
            
            <button class="button button-primary" onclick="executeCommand()">
                ⚡ 执行命令
            </button>
            
            <div class="command-output" id="command-output">
                等待命令...
            </div>
        </div>
        
        <!-- 实时日志 -->
        <div class="card">
            <div class="card-title">
                <span class="icon">📋</span>
                实时日志
                <button class="button button-primary" style="width: auto; padding: 8px 16px; font-size: 12px; margin-left: auto;" onclick="clearLogs()">
                    清空日志
                </button>
            </div>
            
            <div class="log-container" id="log-container">
                <div class="log-entry">
                    <span class="log-time">[系统]</span>
                    <span class="log-level-info">INFO</span>
                    <span class="log-message">控制面板已启动</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = '/api/v1';
        let stats = {
            pageViews: 0,
            apiCalls: 0,
            errors: 0
        };
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkStatus();
            loadEnvVars();
            updateStats();
            startAutoRefresh();
        });
        
        // 检查服务状态
        async function checkStatus() {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            
            try {
                const response = await fetch('http://localhost:5000', {
                    mode: 'no-cors'
                });
                
                statusDot.className = 'status-dot online';
                statusText.textContent = '在线';
                document.getElementById('uptime').textContent = '运行中';
                
                addLog('INFO', '前端服务在线');
                return true;
            } catch (error) {
                statusDot.className = 'status-dot offline';
                statusText.textContent = '离线';
                document.getElementById('uptime').textContent = '未启动';
                
                addLog('ERROR', '前端服务离线');
                return false;
            }
        }
        
        // 加载环境变量
        function loadEnvVars() {
            const envVars = document.getElementById('env-vars');
            const vars = [
                { key: 'EXPO_PUBLIC_BACKEND_BASE_URL', value: process.env.EXPO_PUBLIC_BACKEND_BASE_URL || '未设置' },
                { key: 'EXPO_PUBLIC_COZE_PROJECT_ID', value: process.env.EXPO_PUBLIC_COZE_PROJECT_ID || '未设置' },
                { key: 'NODE_ENV', value: 'development' },
            ];
            
            envVars.innerHTML = vars.map(v => `
                <div class="env-item">
                    <span class="env-key">${v.key}</span>
                    <span class="env-value">${v.value}</span>
                </div>
            `).join('');
        }
        
        // 更新统计信息
        function updateStats() {
            // 模拟数据，实际应该从后端获取
            stats.pageViews = Math.floor(Math.random() * 1000) + 100;
            stats.apiCalls = Math.floor(Math.random() * 5000) + 500;
            stats.errors = Math.floor(Math.random() * 10);
            const memory = (Math.random() * 100 + 50).toFixed(1);
            
            document.getElementById('page-views').textContent = stats.pageViews;
            document.getElementById('api-calls').textContent = stats.apiCalls;
            document.getElementById('errors').textContent = stats.errors;
            document.getElementById('memory').textContent = memory + ' MB';
        }
        
        // 自动刷新
        function startAutoRefresh() {
            setInterval(() => {
                checkStatus();
                updateStats();
            }, 10000); // 每 10 秒刷新一次
        }
        
        // 重载应用
        function reloadApp() {
            addLog('INFO', '正在重载应用...');
            
            // 通过 postMessage 向前端发送重载指令
            if (window.opener) {
                window.opener.postMessage({ action: 'reload' }, '*');
            }
            
            // 或者直接刷新当前页面
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        }
        
        // 清理缓存
        function clearCache() {
            addLog('INFO', '正在清理缓存...');
            
            // 清理 localStorage
            localStorage.clear();
            
            // 清理 sessionStorage
            sessionStorage.clear();
            
            // 清理缓存（通过 Service Worker）
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => {
                        caches.delete(name);
                    });
                });
            }
            
            addLog('SUCCESS', '缓存已清理');
            alert('缓存已清理，建议刷新页面');
        }
        
        // 打开开发者工具
        function openDevTools() {
            addLog('INFO', '打开开发者工具');
            alert('按 F12 或 Ctrl+Shift+I 打开开发者工具');
        }
        
        // 硬刷新
        function hardRefresh() {
            addLog('INFO', '执行硬刷新...');
            
            // 清除缓存并刷新
            location.reload(true);
        }
        
        // 执行命令
        function executeCommand() {
            const input = document.getElementById('command-input');
            const output = document.getElementById('command-output');
            const command = input.value.trim();
            
            if (!command) {
                output.innerHTML = '请输入命令';
                return;
            }
            
            addLog('INFO', `执行命令: ${command}`);
            output.innerHTML = `执行中...`;
            
            try {
                // 尝试执行命令（在当前窗口）
                const result = eval(command);
                
                if (result !== undefined) {
                    output.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
                    addLog('SUCCESS', `命令执行成功`);
                } else {
                    output.innerHTML = '命令已执行（无返回值）';
                    addLog('SUCCESS', `命令已执行`);
                }
            } catch (error) {
                output.innerHTML = `<span style="color: #ef4444;">错误: ${error.message}</span>`;
                addLog('ERROR', `命令执行失败: ${error.message}`);
            }
            
            input.value = '';
        }
        
        // 添加日志
        function addLog(level, message) {
            const container = document.getElementById('log-container');
            const time = new Date().toLocaleTimeString();
            
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            
            const levelClass = `log-level-${level.toLowerCase()}`;
            
            logEntry.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="${levelClass}">${level}</span>
                <span class="log-message">${message}</span>
            `;
            
            container.insertBefore(logEntry, container.firstChild);
            
            // 限制日志数量
            while (container.children.length > 100) {
                container.removeChild(container.lastChild);
            }
        }
        
        // 清空日志
        function clearLogs() {
            const container = document.getElementById('log-container');
            container.innerHTML = '';
            addLog('INFO', '日志已清空');
        }
        
        // 监听来自前端的消息
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'log') {
                addLog(event.data.level, event.data.message);
            }
        });
        
        // 模拟环境变量（因为在浏览器中无法直接访问 process.env）
        const process = {
            env: {
                EXPO_PUBLIC_BACKEND_BASE_URL: 'https://3d2f73a5-2786-4b27-8c79-5b459cae268c.dev.coze.site',
                EXPO_PUBLIC_COZE_PROJECT_ID: '7608441277314744358'
            }
        };
    </script>
</body>
</html>
